services:
  db:
    image: ankane/pgvector:latest
    container_name: mini-coze-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: mini_coze
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
